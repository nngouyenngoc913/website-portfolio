<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nancy Nguyen | Accountancy Automation Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap');

    :root {
      --ink: #0f0e0d;
      --paper: #faf9f6;
      --accent: #1a3a5c;
      --rule: rgba(15, 14, 13, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.5; }

    .serif { font-family: 'DM Serif Display', serif; }
    .mono { font-family: 'DM Mono', monospace; }

    .pcard { background: white; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
    .pcard:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 12px 24px rgba(0,0,0,0.05); }
    .pcard-img { width: 100%; height: 170px; object-fit: cover; filter: grayscale(20%); transition: 0.5s; }
    .pcard:hover .pcard-img { filter: grayscale(0%); }

    .flow-nav::-webkit-scrollbar { display: none; }
    .flow-nav { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

<header class="p-10 border-b border-black/10 flex justify-between items-end bg-white">
  <div>
    <div class="serif text-3xl">Nancy Nguyen<span class="text-accent italic mx-1">×</span>Automation</div>
    <p class="mono text-[10px] tracking-widest uppercase mt-2 opacity-50">FINTECH · AI OPS · ACCOUNTING</p>
  </div>
</header>

<nav class="flow-nav p-6 px-10 bg-white border-b border-black/10 flex gap-6 overflow-x-auto sticky top-0 z-[100]">
  <span class="flow-step active mono text-[10px] text-accent font-bold uppercase whitespace-nowrap">Business Nature</span>
  <span class="flow-step mono text-[10px] text-gray-400 uppercase whitespace-nowrap">→ Double Entry</span>
  <span class="flow-step mono text-[10px] text-gray-400 uppercase whitespace-nowrap">→ Reconciliation</span>
  <span class="flow-step mono text-[10px] text-gray-400 uppercase whitespace-nowrap">→ AR Aging</span>
  <span class="flow-step mono text-[10px] text-gray-400 uppercase whitespace-nowrap">→ Compliance</span>
</nav>

<main class="p-10 max-w-[1300px] mx-auto">

  <!-- PHẦN NHÚNG CANVA PORTFOLIO MỚI -->
  <h2 class="serif text-2xl mb-8 border-b border-black/10 pb-2">Visual Strategy <span class="text-gray-400 font-light text-xl italic ml-2">Canva Portfolio</span></h2>
  <div class="mb-16">
    <div style="position: relative; width: 100%; height: 0; padding-top: 56.2500%; padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); overflow: hidden; border-radius: 8px; will-change: transform;">
      <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
        src="https://www.canva.com/design/DAG-W1QBFXQ/nsTIFpTSyEC1BwaAXxwHbw/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
      </iframe>
    </div>
    <p class="mono text-[10px] text-gray-400 mt-4 text-center italic">Portfolio by Nguyen Ngo Uyen Ngoc</p>
  </div>

  <div id="dynamic-sections"></div>

</main>

<footer class="p-16 border-t border-black/10 text-center bg-white mt-16">
  <p class="mono text-[10px] text-gray-400 uppercase tracking-[4px]">Nancy Nguyen Creative Framework © 2026</p>
</footer>

<script>
  const siteData = {
    projects: {
      title: "Core Architecture",
      items: [
        { title: "Company report - FMCG", description: "Trực quan hóa dữ liệu hiệu suất cổ phiếu niêm yết.", link: "https://vnmproject1.netlify.app/", image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=800", tag: "Analysis" },
        { title: "Double-entry Logic", description: "Quy trình hạch toán tự động tích hợp AI gợi ý phân loại.", link: "https://canva.link/41sfnm3pnld703v", image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800", tag: "Systems" },
        { title: "IFRS Hierarchy", description: "Khung tương tác chuẩn báo cáo tài chính quốc tế (IFRS).", link: "https://nngouyenngoc913.github.io/ifrs-hierachy/", image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=800", tag: "IFRS" }
      ]
    },
    insights: {
      title: "Financial Ops Insights",
      items: [
        { title: "01. Customer Ops", tag: "Behavior", description: "Tái cấu trúc điểm chạm khách hàng giúp đẩy nhanh tốc độ thu hồi tiền mặt.", image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=800" },
        { title: "02. Financial Ops", tag: "Debt Management", description: "Chẩn đoán khoảng cách tiền mặt và thiết lập báo cáo tự động.", image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=800" },
        { title: "03. Negotiation Logic", tag: "Deal Structuring", description: "Đàm phán dựa trên số liệu thực tế để bảo vệ dòng tiền.", image: "https://images.unsplash.com/photo-1573497620053-ea531f3942bf?w=800" }
      ]
    },
    videos: {
      title: "Video Case Studies",
      items: [
        { title: "Agentic Workflows", description: "Hệ thống tự trị tối ưu hóa vận hành tài chính qua AI Ops.", videoId: "RXbkd8viWtg", tag: "AI Ops" },
        { title: "SEO Automation", description: "Luồng n8n kết hợp Web Scraping và OpenAI.", videoId: "w-JB9sCkvkQ", tag: "Automation" }
      ]
    }
  };

  function init() {
    const mainContainer = document.getElementById('dynamic-sections');
    [siteData.projects, siteData.insights].forEach(section => {
      const sectionHtml = `
        <h2 class="serif text-2xl mb-8 border-b border-black/10 pb-2 mt-16">${section.title}</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          ${section.items.map(item => `
            <div class="pcard">
              <img src="${item.image}" class="pcard-img">
              <div class="p-6 flex flex-col flex-grow">
                <span class="mono text-[8px] text-accent font-bold uppercase tracking-widest mb-2">${item.tag}</span>
                <h3 class="text-lg font-bold mb-3">${item.title}</h3>
                <p class="text-xs text-gray-500 mb-6 flex-grow leading-relaxed">${item.description}</p>
                ${item.link ? `<a href="${item.link}" target="_blank" class="mono text-[10px] border-b border-black self-start pb-1 hover:text-accent hover:border-accent">Explore ↗</a>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      mainContainer.insertAdjacentHTML('beforeend', sectionHtml);
    });

    const videoSection = `
      <h2 class="serif text-2xl mb-8 border-b border-black/10 pb-2 mt-16">${siteData.videos.title}</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        ${siteData.videos.items.map(v => `
          <div class="pcard">
            <div class="relative pb-[56.25%] h-0 bg-black">
              <iframe class="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/${v.videoId}" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="p-6">
              <span class="mono text-[8px] text-accent font-bold uppercase tracking-widest mb-2">${v.tag}</span>
              <h3 class="text-lg font-bold mb-3">${v.title}</h3>
              <p class="text-xs text-gray-500 leading-relaxed">${v.description}</p>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    mainContainer.insertAdjacentHTML('beforeend', videoSection);
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
