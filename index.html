<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nancy Nguyen | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; scroll-behavior: smooth; }
        .social-icon { width: 28px; height: 28px; transition: transform 0.2s; border-radius: 4px; }
        .social-icon:hover { transform: scale(1.1); }
    </style>
</head>
<body class="text-gray-900 pb-10">

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">
            <a href="#" class="font-extrabold text-blue-600 text-lg">Nancy.</a>
            <div id="social-display" class="flex gap-4">    
                <a href="https://www.linkedin.com/in/nguyen-ngo-uyen-ngoc-/" target="_blank"><img src="https://www.linkedin.com/favicon.ico" class="social-icon" alt="LinkedIn"></a>
                <a href="https://www.tiktok.com/@nguyenngouyenngoc" target="_blank"><img src="https://www.tiktok.com/favicon.ico" class="social-icon" alt="TikTok"></a>
            </div>
        </div>
    </nav>

    <header class="pt-16 pb-10 px-6 text-center bg-white">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 leading-tight">How I create <span class="text-blue-600">"results"</span>?</h1>
        <p class="text-gray-500 text-lg font-medium max-w-2xl mx-auto">Workflows bridging Community, HR, and Operations.</p>
    </header>

    <section id="projects" class="py-12 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="mb-8"><h2 class="text-2xl font-bold italic">Done Projects</h2><p class="text-gray-400 text-xs uppercase tracking-widest">Instruction & Manuals</p></div>
            <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <section class="py-12 px-6 bg-gray-50/50">
        <div class="max-w-6xl mx-auto">
            <div class="mb-8"><h2 class="text-2xl font-bold">E-commerce</h2><p class="text-gray-400 text-xs uppercase">Data & Analytics</p></div>
            <div id="ecommerce-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <section class="py-10 px-6">
        <div class="max-w-6xl mx-auto border-t border-gray-100 pt-10">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-50">
                <div class="flex items-center gap-4">
                    <span class="text-2xl">🚀</span>
                    <div>
                        <h4 class="font-bold text-gray-900">Interactive Spaces</h4>
                        <p class="text-gray-500 text-xs">LLM Assistants powered by Hugging Face</p>
                    </div>
                </div>
                <div class="flex flex-wrap gap-3">
                    <a href="https://huggingface.co/spaces/ngocng19/legal" target="_blank" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-xs hover:bg-blue-700 transition-all">Legal Space ⚖️</a>
                    <a href="https://huggingface.co/spaces/ngocng19/LLM" target="_blank" class="bg-gray-900 text-white px-5 py-2 rounded-lg font-bold text-xs hover:bg-black transition-all">Reflection Space 🧠</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const projectData = [
            { id: 1, title: "Financial analysis", description: "Concise powerpoint about listed-stock.", link: "https://www.canva.com/design/DAG8Mbhewnk/YojBocWi21N47JHFLcC1HQ/edit", image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&q=80&w=400" },
            { id: 2, title: "Double-entry", description: "Accounting Workflow visualization.", link: "https://www.canva.com/design/DAG9Upfoaqg/_ATzgDn7K2mqGLUafspJ8g/edit", image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=400" },
            { id: 3, title: "IFRS Framework", description: "Comprehensive IFRS hierarchy.", link: "https://nngouyenngoc913.github.io/ifrs-hierachy/", image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&q=80&w=400" },
            { id: 4, title: "Data Ops", description: "Aging receivables & accounting books.", link: "https://drive.google.com/drive/u/1/folders/1UEIMgh0UKr9ymnZUDbJb8WvhjGzSD9_m", image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=400" }
        ];

        const ecommerceData = [
             { id: 5, title: "Tiktok Shop", description: "Seller center analytics & reporting.", link: "#", image: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?auto=format&fit=crop&q=80&w=400" }
        ];

        function createCard(card) {
            const div = document.createElement('div');
            div.className = "bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full overflow-hidden hover:shadow-md transition-all";
            div.innerHTML = `
                <div class="h-32 bg-gray-100"><img src="${card.image}" class="w-full h-full object-cover"></div>
                <div class="p-4 flex flex-col flex-grow">
                    <h3 class="font-bold text-sm mb-1">${card.title}</h3>
                    <p class="text-gray-500 text-xs mb-4 flex-grow">${card.description}</p>
                    <a href="${card.link}" target="_blank" class="bg-blue-50 text-blue-600 text-center py-2 rounded-lg text-xs font-bold hover:bg-blue-100 transition-colors">View Project</a>
                </div>`;
            return div;
        }

        const render = () => {
            projectData.forEach(c => document.getElementById('project-grid').appendChild(createCard(c)));
            ecommerceData.forEach(c => document.getElementById('ecommerce-grid').appendChild(createCard(c)));
        }
        render();
    </script>
</body>
</html>
