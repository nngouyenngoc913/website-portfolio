<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Portfolio</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #111;
            --accent: #2563eb;
            --border: #ececec;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            margin: 0;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
        }

        h2 { font-size: 1.2rem; margin: 40px 0 20px; font-weight: 500; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .project-card:hover { transform: translateY(-3px); }

        .project-image img, .video-container {
            width: 100%;
            height: 180px;
            background: #eee;
        }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .project-content { padding: 20px; }
        .project-title { font-weight: 700; margin: 0 0 10px; }
        .project-description { font-size: 0.9rem; color: #555; margin-bottom: 15px; }
        .project-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Portfolio</h1></header>

    <section>
        <h2>Strategic Projects</h2>
        <div id="project-grid" class="grid-container"></div>
    </section>

    <section>
        <h2>Automation & Video Demos</h2>
        <div id="social-grid" class="grid-container"></div>
    </section>
</div>

<script>
    const projectData = [
        { 
            title: "Company report - FMCG", 
            description: "Concise data visualization and insights for listed-stock performance.", 
            link: "https://vnmproject1.netlify.app/", 
            image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=600" 
        },
        { 
            title: "Double-entry Logic", 
            description: "Visual mapping of complex accounting workflows and system integrations.", 
            link: "https://canva.link/41sfnm3pnld703v", 
            image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600" 
        },
        { 
            title: "IFRS Hierarchy", 
            description: "A digital interactive framework for International Financial Reporting Standards.", 
            link: "https://nngouyenngoc913.github.io/ifrs-hierachy/", 
            image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=600" 
        }
    ];

    const socialData = [
        {
            title: "Agentic Workflows", 
            description: "Building autonomous systems for departmental efficiency and task management.", 
            videoId: "RXbkd8viWtg", 
        }
    ];

    function createCard(item) {
        const div = document.createElement('div');
        div.className = 'project-card';
        
        const mediaHTML = item.videoId 
            ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${item.videoId}" allowfullscreen></iframe></div>`
            : `<div class="project-image"><img src="${item.image}" alt="${item.title}" loading="lazy"></div>`;

        div.innerHTML = `
            ${mediaHTML}
            <div class="project-content">
                <h3 class="project-title">${item.title}</h3>
                <p class="project-description">${item.description}</p>
                ${item.link ? `<a href="${item.link}" target="_blank" rel="noopener" class="project-link">View Project</a>` : ''}
            </div>
        `;
        return div;
    }

    function renderAll() {
        const pGrid = document.getElementById('project-grid');
        const sGrid = document.getElementById('social-grid');

        if (pGrid) {
            pGrid.innerHTML = '';
            projectData.forEach(item => pGrid.appendChild(createCard(item)));
        }
        if (sGrid) {
            sGrid.innerHTML = '';
            socialData.forEach(item => sGrid.appendChild(createCard(item)));
        }
    }

    // Run the render function immediately if the DOM is already ready, 
    // otherwise wait for the event.
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderAll);
    } else {
        renderAll();
    }
</script>

</body>
</html>
