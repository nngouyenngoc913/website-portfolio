<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nancy Nguyen | Portfolio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfd;
            color: #333;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Navigation */
        nav {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 0;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; color: #2563eb; text-decoration: none; }
        .social-icons { display: flex; gap: 15px; }
        .social-icon { width: 28px; height: 28px; border-radius: 4px; transition: transform 0.2s; }
        .social-icon:hover { transform: scale(1.1); }

        /* Header */
        header { text-align: center; padding: 80px 20px 60px; background: white; }
        .subtitle { font-size: 1.2rem; color: #666; font-weight: 500; max-width: 700px; margin: 0 auto; }

        /* Sections */
        section { padding: 60px 0; }
        .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .section-subtitle { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 40px; }

        /* Project Grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .project-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #eee;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .project-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.06); 
        }

        /* Media Containers */
        .project-image { height: 200px; background: #f8fafc; overflow: hidden; }
        .project-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #000; 
        }
        .video-container iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; 
        }

        .project-content { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; }
        .project-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; color: #1e293b; }
        .project-description { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; flex-grow: 1; }
        
        .project-link {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .project-link:hover { background: #1d4ed8; }

        /* CTA Section */
        .cta { background: #f8fafc; padding: 60px 0; }
        .cta-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 40px;
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 24px;
        }
        @media (min-width: 768px) { .cta-card { flex-direction: row; justify-content: space-between; text-align: left; } }
        .cta-button { background: #2563eb; color: white; padding: 14px 28px; border-radius: 12px; text-decoration: none; font-weight: 700; }

        footer { text-align: center; padding: 40px 0; color: #94a3b8; font-size: 0.9rem; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<nav>
    <div class="container nav-content">
        <a href="#" class="logo">Nancy.</a>
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/nguyen-ngo-uyen-ngoc-/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" class="social-icon" alt="LinkedIn">
            </a>
            <a href="https://www.tiktok.com/@nguyenngouyenngoc" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="social-icon" alt="TikTok">
            </a>
        </div>
    </div>
</nav>

<header>
    <div class="container">
        <h1 class="subtitle">Workflows bridging Operations through AI Automation</h1>
    </div>
</header>

<section id="projects">
    <div class="container">
        <h2 class="section-title">Done Projects</h2>
        <p class="section-subtitle">Instruction & Manuals</p>
        <div class="project-grid" id="project-grid"></div>
    </div>
</section>

<section style="background: #ffffff; border-top: 1px solid #f1f5f9;">
    <div class="container">
        <h2 class="section-title">Social Sourcing</h2>
        <p class="section-subtitle">Efficiency & Agentic Workflows</p>
        <div class="project-grid" id="social-grid"></div>
    </div>
</section>

<section class="cta">
    <div class="container">
        <div class="cta-card">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="font-size: 2.5rem;">🤖</div>
                <div>
                    <h4 style="font-size: 1.25rem; margin-bottom: 4px;">Interactive Spaces</h4>
                    <p style="color: #64748b;">Custom LLM Assistants powered by Hugging Face</p>
                </div>
            </div>
            <a href="https://huggingface.co/spaces/ngocng19/legal" target="_blank" class="cta-button">Launch Legal Space ⚖️</a>
        </div>
    </div>
</section>

<footer>
    <div class="container">
        <p>© 2026 Nancy Nguyen. All rights reserved.</p>
    </div>
</footer>

<script>
// Section 1: Traditional Projects
const projectData = [
    { 
        title: "Financial Analysis", 
        description: "Concise data visualization and insights for listed-stock performance.", 
        link: "https://canva.link/23k7v6t3o3ry0v8", 
        image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=600" 
    },
    { 
        title: "Double-entry Logic", 
        description: "Visual mapping of complex accounting workflows and system integrations.", 
        link: "https://canva.link/41sfnm3pnld703v", 
        image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600" 
    },
    { 
        title: "IFRS Hierarchy", 
        description: "A digital interactive framework for International Financial Reporting Standards.", 
        link: "https://nngouyenngoc913.github.io/ifrs-hierachy/", 
        image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=600" 
    }
];

// Section 2: Automation & Video Demos
const socialData = [
   {
        title: "AI Receipt Automation", 
        description: "n8n workflow using OpenAI to parse unstructured invoice data directly into Google Sheets.", 
        videoId: "7409180252633841425" // Updated workspace-friendly ID
   },
   {
        title: "Agentic Workflows", 
        description: "Building autonomous systems for departmental efficiency and task management.", 
        videoId: "7409178252733841425"
   }
];

function createCard(item, isVideo = false) {
    const div = document.createElement('div');
    div.className = 'project-card';
    
    const mediaHTML = isVideo 
        ? `<div class="video-container">
            <iframe src="https://www.capcut.com/player/${item.videoId}?workspaceId=7409178252733841425" 
            allow="clipboard-write" allowfullscreen></iframe>
           </div>`
        : `<div class="project-image">
            <img src="${item.image}" alt="${item.title}" loading="lazy">
           </div>`;

    div.innerHTML = `
        ${mediaHTML}
        <div class="project-content">
            <h3 class="project-title">${item.title}</h3>
            <p class="project-description">${item.description}</p>
            ${item.link ? `<a href="${item.link}" target="_blank" class="project-link">View Project</a>` : ''}
        </div>
    `;
    return div;
}

function renderAll() {
    const projectGrid = document.getElementById('project-grid');
    const socialGrid = document.getElementById('social-grid');

    if (projectGrid) {
        projectData.forEach(item => projectGrid.appendChild(createCard(item, false)));
    }
    if (socialGrid) {
        socialData.forEach(item => socialGrid.appendChild(createCard(item, true)));
    }
}

document.addEventListener('DOMContentLoaded', renderAll);
</script>
</body>
</html>
