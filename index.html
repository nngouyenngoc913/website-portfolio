<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Systems Portfolio</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary-text: #1a1a1b;
            --secondary-text: #4a4a4a;
            --accent: #2563eb;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--primary-text);
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* Card Styling */
        .project-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid var(--border);
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Media Handling */
        .project-image img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Content Styling */
        .project-content {
            padding: 1.5rem;
        }

        .project-title {
            margin: 0 0 0.75rem 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .project-description {
            color: var(--secondary-text);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .project-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .project-link:hover {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Portfolio</h1>
        </header>

        <section>
            <h2>Strategic Projects</h2>
            <div id="project-grid" class="grid-container">
                </div>
        </section>

        <section>
            <h2>Automation & Video Demos</h2>
            <div id="social-grid" class="grid-container">
                </div>
        </section>
    </div>

    <script>
        const projectData = [
            { 
                title: "Company report - FMCG", 
                description: "Concise data visualization and insights for listed-stock performance.", 
                link: "https://vnmproject1.netlify.app/", 
                image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=600" 
            },
            { 
                title: "Double-entry Logic", 
                description: "Visual mapping of complex accounting workflows and system integrations.", 
                link: "https://canva.link/41sfnm3pnld703v", 
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600" 
            },
            { 
                title: "IFRS Hierarchy", 
                description: "A digital interactive framework for International Financial Reporting Standards.", 
                link: "https://nngouyenngoc913.github.io/ifrs-hierachy/", 
                image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=600" 
            }
        ];

        const socialData = [
            {
                title: "Agentic Workflows", 
                description: "Building autonomous systems for departmental efficiency and task management.", 
                videoId: "RXbkd8viWtg", 
            }
                title: "Agentic Workflows", 
                description: "Building autonomous systems for departmental efficiency and task management.", 
                videoId: "JB9sCkvkQ"
            {
            }
        ];

        /**
         * Creates a project card element.
         */
        function createCard(item) {
            const div = document.createElement('div');
            div.className = 'project-card';

            // Switch between video and image
            const mediaHTML = item.videoId 
                ? `<div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/${item.videoId}" 
                        title="${item.title}" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                   </div>`
                : `<div class="project-image">
                    <img src="${item.image}" alt="${item.title}" loading="lazy">
                   </div>`;

            // Note: Added rel="noopener" for security on external links
            div.innerHTML = `
                ${mediaHTML}
                <div class="project-content">
                    <h3 class="project-title">${item.title}</h3>
                    <p class="project-description">${item.description}</p>
                    ${item.link ? `<a href="${item.link}" target="_blank" rel="noopener" class="project-link">View Project</a>` : ''}
                </div>
            `;
            
            return div;
        }

        /**
         * Renders all cards into their respective grids.
         */
        function renderAll() {
            const projectGrid = document.getElementById('project-grid');
            const socialGrid = document.getElementById('social-grid');

            if (projectGrid) {
                projectGrid.innerHTML = '';
                projectData.forEach(item => projectGrid.appendChild(createCard(item)));
            }
            
            if (socialGrid) {
                socialGrid.innerHTML = '';
                socialData.forEach(item => socialGrid.appendChild(createCard(item)));
            }
        }

        document.addEventListener('DOMContentLoaded', renderAll);
    </script>

</body>
</html>
