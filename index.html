<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Finance & Automation</title>
    <style>
        /* CSS Variables for easy color management */
        :root {
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text-dark: #111827;
            --text-muted: #4b5563;
            --accent: #2563eb;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            line-height: 1.5;
            padding: 0 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header / Hero Section */
        header {
            padding: 80px 0 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Section Headings */
        section {
            padding: 40px 0;
        }

        h2 {
            font-size: 1.75rem;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        /* The Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Project Card Styling */
        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Media Containers */
        .project-image img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Content inside cards */
        .project-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .project-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .project-link {
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
        }

        .project-link:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>

        </section>

        <footer>
            <p>&copy; 2026 Portfolio. Built with HTML, CSS, and Vanilla JS.</p>
        </footer>
    </div>
