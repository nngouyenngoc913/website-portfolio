<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nancy Nguyen | AI-Native Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=DM+Serif+Display&display=swap');
    body { font-family: 'Outfit', sans-serif; background-color: #faf9f6; }
    .serif { font-family: 'DM Serif Display', serif; }
  </style>
</head>
<body class="text-slate-900">

  <!-- Header -->
  <header class="p-8 border-b border-slate-200 flex justify-between items-center bg-white">
    <div>
      <h1 class="serif text-3xl">Nancy Nguyen<span>.</span></h1>
      <p class="text-[10px] tracking-[0.2em] uppercase text-slate-400 mt-1">AI Ops & Automation Strategy</p>
    </div>
    <div class="flex items-center gap-2">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span class="text-[10px] font-mono text-slate-500">n8n FLOW ACTIVE</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto py-16 px-6">
    <div class="mb-12 border-b border-slate-200 pb-4 flex justify-between items-end">
      <h2 class="serif text-2xl text-slate-800">Automated Insights</h2>
      <span class="text-[10px] font-mono text-slate-400 uppercase">Refreshed via Webhook</span>
    </div>

    <!-- Blog Container -->
    <div id="dynamic-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Loading State -->
      <div class="col-span-full py-20 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-slate-900 mb-4"></div>
        <p class="font-mono text-xs text-slate-400 uppercase tracking-widest">Awaiting AI Response...</p>
      </div>
    </div>
  </main>

  <footer class="mt-20 p-12 bg-slate-100 border-t border-slate-200 text-center">
    <p class="text-xs font-mono text-slate-400">
      Data Source: <a href="https://ai.n8n.vn/workflow/5LtMLP5zufTT5u1f" class="underline hover:text-slate-600">n8n Workflow</a> 
      | Deployed on GitHub Pages
    </p>
  </footer>

  <script>
    const WEBHOOK_URL = "https://ai.n8n.vn/webhook/d962c916-6369-431a-9d80-af6e6a50fdf5";

    // Hàm đệ quy để render UI từ cấu trúc JSON Schema của OpenAI
    function renderComponent(node) {
      if (!node || typeof node !== 'object') return null;

      // Tạo element dựa trên type (div, p, h1, etc.)
      const el = document.createElement(node.type || 'div');

      // Gán nội dung văn bản nếu có
      if (node.label) {
        el.textContent = node.label;
      }

      // Gán các thuộc tính (className, href, etc.)
      if (node.attributes && Array.isArray(node.attributes)) {
        node.attributes.forEach(attr => {
          if (attr.name === 'className') {
            el.className = attr.value;
          } else {
            el.setAttribute(attr.name, attr.value);
          }
        });
      }

      // Render các con (đệ quy)
      if (node.children && Array.isArray(node.children)) {
        node.children.forEach(child => {
          const childEl = renderComponent(child);
          if (childEl) el.appendChild(childEl);
        });
      }

      return el;
    }

    async function fetchAIContent() {
      const container = document.getElementById('dynamic-content');
      
      try {
        const response = await fetch(WEBHOOK_URL);
        if (!response.ok) throw new Error('Webhook error');
        
        const data = await response.json();
        
        container.innerHTML = ''; // Xóa loader

        // Kiểm tra nếu dữ liệu là mảng hoặc object đơn lẻ
        const items = Array.isArray(data) ? data : [data];

        items.forEach(item => {
          // Nếu n8n trả về trực tiếp schema UI, ta render nó
          const rendered = renderComponent(item);
          if (rendered) {
            container.appendChild(rendered);
          }
        });

      } catch (error) {
        console.error("Fetch error:", error);
        container.innerHTML = `
          <div class="col-span-full p-8 border border-red-100 bg-red-50 rounded-lg text-center">
            <p class="text-red-500 text-sm font-mono uppercase tracking-tighter">Connection Failed</p>
            <p class="text-xs text-red-400 mt-2 italic">Hãy đảm bảo n8n workflow đã bật 'Production' và URL webhook chính xác.</p>
          </div>
        `;
      }
    }

    window.onload = fetchAIContent;
  </script>
</body>
</html>
