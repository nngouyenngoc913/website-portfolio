<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Portfolio | Finance & Automation</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #111;
            --accent: #2563eb;
            --border: #ececec;
            --primary: #ff6719; /* Your blog accent color */
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            margin: 0;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
        }

        h2 { font-size: 1.2rem; margin: 40px 0 20px; font-weight: 500; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            position: relative; /* Needed for edit button */
        }

        .project-card:hover { transform: translateY(-3px); }

        .project-image img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .project-content { padding: 20px; flex-grow: 1; }
        .project-title { font-weight: 700; margin: 0 0 10px; }
        .project-description { font-size: 0.9rem; color: #555; margin-bottom: 15px; }
        .project-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.85rem; }

        /* CMS UI Styles */
        .cms-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .edit-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.9);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
            font-size: 11px;
            border: 1px solid #ccc;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .modal.show { display: flex; }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }
        .modal-box input, .modal-box textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Portfolio</h1></header>

    <section>
        <h2>Strategic Projects</h2>
        <div id="project-grid" class="grid-container"></div>
    </section>

    <section>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Accounting Blog & Insights</h2>
            <button class="cms-btn" onclick="openModal()">+ New Post</button>
        </div>
        <div id="blog-grid" class="grid-container"></div>
    </section>

    <section>
        <h2>Automation & Video Demos</h2>
        <div id="social-grid" class="grid-container"></div>
    </section>
</div>

<div class="modal" id="cms-modal">
    <div class="modal-box">
        <h3 style="margin-top:0">Manage Blog Post</h3>
        <input id="cms-title" placeholder="Title">
        <input id="cms-link" placeholder="Substack URL">
        <input id="cms-image" placeholder="Image URL">
        <input id="cms-video" placeholder="YouTube Video ID (Optional)">
        <textarea id="cms-desc" placeholder="Brief description..."></textarea>
        
        <div style="display:flex; gap:10px">
            <button onclick="publishPost()" style="flex:2; background:#28a745; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Save to LocalStorage</button>
            <button onclick="closeModal()" style="flex:1; background:#6c757d; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Cancel</button>
        </div>
        <p style="font-size:0.7rem; color:#888; margin-top:10px">Note: Changes are saved to your browser's local storage.</p>
    </div>
</div>

<script>
    // --- 1. DATA DEFINITIONS ---
    const projectData = [
        { title: "Company report - FMCG", description: "Concise data visualization and insights for listed-stock performance.", link: "https://vnmproject1.netlify.app/", image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=600" },
        { title: "Double-entry Logic", description: "Visual mapping of complex accounting workflows and system integrations.", link: "https://canva.link/41sfnm3pnld703v", image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600" },
        { title: "IFRS Hierarchy", description: "A digital interactive framework for International Financial Reporting Standards.", link: "https://nngouyenngoc913.github.io/ifrs-hierachy/", image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=600" }
    ];

    const socialData = [
        { title: "Agentic Workflows", description: "Building autonomous systems for departmental efficiency and task management.", videoId: "RXbkd8viWtg" },
        { title: "SEO Content Automation", description: "An n8n workflow using web scraping and OpenAI to generate SEO content.", videoId: "w-JB9sCkvkQ" }
    ];
    
    const serviceData = [
    {
        title: "01. Customer Ops",
        description: "Redesigning touchpoints so collection happens faster. Includes Payment behavior mapping and Delay trigger analysis.",
        link: "#", // Link to your specific service page or anchor
        image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600",
        tag: "Behavior & Experience"
    },
    {
        title: "02. Financial Ops",
        description: "Turning messy financials into trackable systems. Cash gap diagnosis and automated monthly cashflow reporting.",
        link: "#",
        image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600",
        tag: "Debt Management"
    },
];
    const defaultBlogPosts = [
        { title: "KPMG Tax Case Study", link: "https://trangtaichinhketoan.substack.com/p/kpmg-tax-case-study", image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=600", description: "Phân tích tình huống thuế từ KPMG giúp nắm bắt xử lý nghiệp vụ phức tạp." },
        { title: "Ledger Logic", link: "https://trangtaichinhketoan.substack.com/p/ledger-logic", image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=600", description: "Khám phá bản chất ghi chép kép và tư duy định khoản." }
    ];

    let blogPosts = [];
    let editingIndex = null;

    function createCard(item, index = null, isBlog = false) {
    const div = document.createElement('div');
    div.className = 'project-card';
    
    const mediaHTML = item.videoId 
        ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${item.videoId}" allowfullscreen></iframe></div>`
        : `<div class="project-image"><img src="${item.image || 'https://via.placeholder.com/600x400'}" alt="${item.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/600x400?text=Image+Not+Found'"></div>`;

    const editBtn = isBlog ? `<div class="edit-overlay" onclick="editBlog(event, ${index})">EDIT</div>` : '';

    div.innerHTML = `
        ${editBtn}
        ${mediaHTML}
        <div class="project-content">
            <h3 class="project-title">${item.title}</h3>
            <p class="project-description">${item.description}</p>
            
            <div class="project-tags" style="margin-top: auto; padding-bottom: 15px;">
                <span style="font-size: 0.65rem; background: #f0f0f0; color: #666; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;">
                    ${item.tag || 'Engagement'}
                </span>
            </div>

            ${item.link ? `<a href="${item.link}" target="_blank" rel="noopener" class="project-link">Learn more ↗</a>` : ''}
        </div>
    `;
    return div;
}
    
    // --- 3. RENDERING & CMS ---
    function renderAll() {
        // Projects
        const pGrid = document.getElementById('project-grid');
        if (pGrid) {
            pGrid.innerHTML = '';
            projectData.forEach(item => pGrid.appendChild(createCard(item)));
        }
        
        // Social
        const sGrid = document.getElementById('social-grid');
        if (sGrid) {
            sGrid.innerHTML = '';
            socialData.forEach(item => sGrid.appendChild(createCard(item)));
        }

        // Blog (From LocalStorage)
        const bGrid = document.getElementById('blog-grid');
        if (bGrid) {
            bGrid.innerHTML = '';
            blogPosts.forEach((item, idx) => bGrid.appendChild(createCard(item, idx, true)));
        }
    }

    function initBlog() {
        const saved = localStorage.getItem('portfolio_blog_data');
        blogPosts = saved ? JSON.parse(saved) : defaultBlogPosts;
        renderAll();
    }

    function publishPost() {
        const postData = {
            title: document.getElementById('cms-title').value,
            link: document.getElementById('cms-link').value,
            image: document.getElementById('cms-image').value,
            videoId: document.getElementById('cms-video').value,
            description: document.getElementById('cms-desc').value
        };

        if (editingIndex !== null) blogPosts[editingIndex] = postData;
        else blogPosts.unshift(postData);

        localStorage.setItem('portfolio_blog_data', JSON.stringify(blogPosts));
        initBlog();
        closeModal();
    }

    function editBlog(e, i) {
        e.stopPropagation();
        editingIndex = i;
        const p = blogPosts[i];
        document.getElementById('cms-title').value = p.title;
        document.getElementById('cms-link').value = p.link || '';
        document.getElementById('cms-image').value = p.image || '';
        document.getElementById('cms-video').value = p.videoId || '';
        document.getElementById('cms-desc').value = p.description;
        openModal();
    }

    function openModal() { document.getElementById('cms-modal').classList.add('show'); }
    function closeModal() { 
        document.getElementById('cms-modal').classList.remove('show');
        editingIndex = null;
        document.querySelectorAll('#cms-modal input, #cms-modal textarea').forEach(i => i.value = '');
    }

    // Initialization
    initBlog();
</script>

</body>
</html>
